# postgres/postgresql.conf
# Tuned for a VPS with 4GB RAM, SSD storage

# Connection
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# Memory (4GB total, ~2GB for PostgreSQL)
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 8MB
maintenance_work_mem = 128MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# TOAST compression (matches schema spec)
default_toast_compression = lz4

# Logging
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_statement = 'ddl'
log_timezone = 'UTC'

# Locale
timezone = 'UTC'
lc_messages = 'en_US.utf8'
