# docker-compose.override.yml
# Automatically merged with docker-compose.yml during `docker compose up`
# Development-only overrides

services:

  # In development, the frontend is a Vite dev server with HMR.
  # In production, Nginx serves the pre-built static files directly.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: plantuml-frontend-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost/api/v1
      - VITE_WS_BASE_URL=ws://localhost/collaboration
      - VITE_PUBLIC_URL=http://localhost
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - /app/node_modules
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Override Nginx to use dev config (proxies to frontend dev server)
  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

  backend:
    environment:
      - APP_ENV=development
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    volumes:
      - ./backend/app:/app/app:delegated
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  collaboration:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./collaboration/src:/app/src:delegated

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  # No certbot in development
  certbot:
    profiles:
      - production
