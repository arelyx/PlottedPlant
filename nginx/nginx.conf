# nginx/nginx.conf
# Internal reverse proxy and static file server.
#
# TLS is handled by Caddy on the host. This container only serves HTTP
# on port 80 and is not exposed to the public internet.

user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Trust the X-Forwarded-Proto set by the edge (Caddy). nginx no longer
    # terminates TLS, so $scheme is always "http" here; blindly forwarding it
    # would make the backend build http:// absolute/redirect URLs. Fall back to
    # $scheme only when no upstream proxy set the header.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss:; worker-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Default to no-cache. The SPA shell (index.html) is served via a try_files
    # internal redirect that drops location-level add_header, so this http-level
    # `always` header is what keeps a redeploy's new asset hashes from being
    # shadowed by a stale shell. Hashed assets override this in their location.
    add_header Cache-Control "no-cache" always;

    # Request size limits
    client_max_body_size 1m;

    # Upstream definitions
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream collaboration {
        server collaboration:1234;
    }

    server {
        listen 80;
        server_name _;

        # ── Block internal API from public access ──
        location /api/v1/internal/ {
            deny all;
            return 404;
        }

        # ── API routes → Backend ──
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Connection "";

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── WebSocket collaboration → Hocuspocus ──
        # Note: HocuspocusProvider strips trailing slashes, so match without
        # trailing slash to avoid 301 redirect breaking WebSocket handshake.
        location /collaboration {
            proxy_pass http://collaboration;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Static frontend assets ──
        root /usr/share/nginx/html;

        # Content-hashed build assets — safe to cache forever. A missing asset
        # 404s here (regex locations outrank the SPA fallback), so a stale shell
        # never receives HTML in place of a deleted .js chunk.
        # Content-hashed build assets — safe to cache forever. Overriding
        # Cache-Control here cancels inheritance of every http-level add_header,
        # so the security headers are re-declared. A missing asset 404s here
        # (regex locations outrank the SPA fallback) rather than receiving the
        # HTML shell in place of a deleted .js chunk.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        # SPA shell for every route. Inherits the http-level no-cache and
        # security headers (it adds none of its own, so inheritance is intact).
        location / {
            try_files $uri /index.html;
        }

        # ── Nginx health check ──
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
