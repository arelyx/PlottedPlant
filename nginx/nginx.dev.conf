# nginx/nginx.dev.conf
# Simplified — HTTP only, proxies to Vite dev server

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server backend:8000;
    }

    upstream collaboration {
        server collaboration:1234;
    }

    upstream frontend_dev {
        server frontend:3000;
    }

    server {
        listen 80;

        # Block internal endpoints from public access
        location /api/v1/internal/ {
            deny all;
            return 404;
        }

        # API → Backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # WebSocket collaboration → Hocuspocus
        location /collaboration/ {
            proxy_pass http://collaboration/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Everything else → Vite dev server (including HMR WebSocket)
        location / {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location = /health {
            access_log off;
            return 200 "ok\n";
        }
    }
}
